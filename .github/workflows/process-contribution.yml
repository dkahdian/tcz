name: Process Data Contribution

on:
  repository_dispatch:
    types: [data-contribution]

permissions:
  contents: write
  pull-requests: write

jobs:
  process-contribution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.CONTRIBUTION_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract contribution data
        run: |
          cat <<'JSON' > contribution.json
          ${{ toJson(github.event.client_payload) }}
          JSON
          cat contribution.json

      - name: Validate sandbox contribution payload
        run: |
          node <<'EOF'
          const fs = require('fs');
          const raw = fs.readFileSync('contribution.json', 'utf8');
          if (!raw.trim()) {
            throw new Error('Contribution payload is empty.');
          }
          const payload = JSON.parse(raw);
          if (!payload || typeof payload !== 'object') {
            throw new Error('Contribution payload is malformed.');
          }
          if (!payload.submissionId) {
            throw new Error('submissionId is required.');
          }
          if (
            !payload.contributor ||
            typeof payload.contributor.name !== 'string' ||
            !payload.contributor.name.trim() ||
            typeof payload.contributor.email !== 'string' ||
            !payload.contributor.email.trim()
          ) {
            throw new Error('Contributor name and email are required.');
          }
          const edits = payload.sandbox && Array.isArray(payload.sandbox.edits)
            ? payload.sandbox.edits.length
            : 0;
          if (edits === 0) {
            throw new Error('Sandbox contribution must include at least one edit.');
          }
          console.log(`Loaded submission ${payload.submissionId} with ${edits} sandbox edits.`);
          EOF

      - name: Generate contribution files
        run: node --import ./scripts/tsx-register.mjs .github/scripts/generate-contribution.ts

      - name: Run LaTeX bijection round-trip
        run: npm run latex:roundtrip

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Build PR report
        run: node --import ./scripts/tsx-register.mjs .github/scripts/build-contribution-report.ts

      - name: Create branch, commit, and PR
        env:
          GH_TOKEN: ${{ secrets.CONTRIBUTION_TOKEN }}
          CONTRIBUTION_TOKEN: ${{ secrets.CONTRIBUTION_TOKEN }}
        run: |
          chmod +x .github/scripts/create-pr.sh
          .github/scripts/create-pr.sh
